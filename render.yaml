services:
  - type: web
    name: frotas-nova-ambiental
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: frotas-nova-ambiental-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_URL
        sync: false
      - key: NEXTAUTH_URL
        sync: false
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false

databases:
  - name: frotas-nova-ambiental-db
    databaseName: frotas
    user: frotas
    plan: free
